<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 ~ Mull</title>
    <meta name="description" content="The page you were looking for could not be found." />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  </head>
  <body>
    <nav>
      <span class="nav-mark">mull</span>
      <ul class="nav-links" id="nav">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./install.html">Install</a></li>
        <li><a href="./support.html">Support</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
      <button class="mobile-menu-toggle" aria-label="Menu" aria-expanded="false">Menu</button>
    </nav>

    <div class="hero hero-404">
      <div class="hero-content">
        <h1>404</h1>
        <p>That page is not here. It may have moved, or the link is off.</p>
        <div class="hero-actions">
          <a href="./index.html">Back to home</a>
          <a href="./install.html">Get started</a>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Palmshed</p>
      <ul class="footer-links">
        <li><a href="./privacy.html">Privacy</a></li>
        <li><a href="./terms.html">Terms</a></li>
        <li><a href="./trademark.html">Trademark</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
    </footer>

    <script>
      (function() {
        var toggle = document.querySelector('.mobile-menu-toggle');
        var nav = document.getElementById('nav');
        if (!toggle || !nav) return;
        function sync() { toggle.setAttribute('aria-expanded', nav.classList.contains('active')); }
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          nav.classList.toggle('active');
          sync();
        });
        document.addEventListener('click', function(e) {
          if (nav.classList.contains('active') && !nav.contains(e.target) && e.target !== toggle) {
            nav.classList.remove('active');
            sync();
          }
        });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && nav.classList.contains('active')) {
            nav.classList.remove('active');
            sync();
            toggle.focus();
          }
        });
      })();
    </script>
  </body>
</html>
